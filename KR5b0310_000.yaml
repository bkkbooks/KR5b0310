水紫雲春色下丹臺劉仙久矣乘鸞去韓令今仍跨鶴來樽酒相逢足清興新詩吟罷重徘徊又王敬中中四窗山色秀可攬雲根石屋髙嶙峋林間遺舄曽化虎洞裏鞠猴渾似人奔流直下幾千尺髙蹈今逾四十春靈光夜夜照丹室應有神仙來往頻又元得吉雅謨丁東越名山世共聞四窗仙境更超群青天半落銀河水白日長過翠嶺雲塵外鳳歌來隱士林間虎舄候元君知豫不倦登山屐長許相尋謝俗氣又林希原昔聞劉仙翁曽作上虞宰長年養神丹靈藥時自採一朝跨飛鸞喬木凌蒼靄下視塵寰中桑田幾滄海嗟子骨未換何由挹丰采髙躅在人間深懷共千載又汪臣良文璟丹山自昔神仙宅好是靈蹤與世殊百尺懸泉飛蜿蜒千年遺舄化於菟亭臺尚憶吹簫侣芝木長供辟穀徒欲駕柴車訪真隱不知容我俗塵無又楊元慶璲仙子凌空駕玉龍尚餘靈迹在山中過雲拾得青櫺子看瀑因尋白水宫未息干戈逢此日忽聞鍾鼓仰玄風也應脫屣非難事曽識雲間采藥翁又馬易之乃賢城居久憶洞天名春日登臨杖屨輕山雨晴時崖瀑冷巖花落盡石窗明黃冠白髮情偏古野水間雲意自清便欲去尋劉縣令願携妻子學長生又一徑遙通白水宫衆山屹立青芙蓉飛流倒垂千尺練髙處更登三四峰或聞溪獺趂魚走只有仙人跨鶴從看我山中遊十日雲南雲北訪靈蹤又白水真人去不回紫青宫殿倚雲開崖懸一瀑銀為帶山列三峯翠作堆採藥仙童隨鶴過銜花馴鹿倚人來方知異境非塵世且共清吟坐石苔題丹山楊邊梅四明山二百八十青孱顔天空四牖金烏玉兔兩出沒是為三十六洞天之九天別有丹山赤水非人間我夢仙人賀狂客去訪雲翹子孤峯絶頂登大蘭下見洪濤衮日車輪大虹光蜃影雜沓翻瀰漫上有桃花美人者液鳳髓脯龍肝令我食之生羽翰路逢毛先生一笑今與古赤玉之舄墮地化為石我亦間之刀厭虎潮飛大士洞天水門風折祖飛橋石住赤玉之寫何足追下窮地脈上天維鐡船徑渡弱羽水火劔欲斫扶桑枝毛先生毛仙後千春曽醉廬山酒酒醒騎虎却入終山笑呼綵鸞下招手石田玉子大如斗石田髙士居丹山甚能繼其祖武人來每稱之益信名不虛也蒙惠書以詩代簡時余年八十有五薛朝陽廷鳳客來每説洞天勝我亦久懷山水清升仙木近石林古洗藥溪深風雨生三華真人昔居此幾葉玄孫今擅名若問老夫頭未白尚能相訪寫髙情老舅大真人詩寄石田敬和一首因致問訊于一山思緝昔年相送領殊庭別語難忘夢亦清記得四窗同久住借騎一虎問長生丹林已重前朝士白水猶傳上古名若躡三台峰頂望老人星近見君情題丹山韓彥信春風雨度到蓬瀛萬斛羈愁一洗清雨榻卧聽崖瀑響晴窗坐看白雲生映階㻔草經年長出火丹砂九轉成安得誅茅傍樊榭問君乞取石田耕又王叔雨霖三白峯下神仙宅樊榭春風長薜蘿萬疊層巒連石壁一簾飛雨瀑銀河天光上下雲容斂山色空濛雨氣多與客題詩足清賞歸來環佩雜鳴珂又劉坦之履嵯峨赤水山縹眇神仙宅髙哉劉與樊超然遊八極一去何寥寥千載遺靈迹中有卧雲人冥栖鍊精魄幽林拾青櫺寒泉煮白石致身瀟爽間邈與塵世隔我來一見之傾倒如宿昔松花釀為酒持以苦留客又陳君從潺湲洞口看飛瀑細雨霏霏灑接籬白水真人能好客碧山學士愛題詩鞠侯夜嘯三花樹野鹿時銜五色芝試問劉樊仙去後何人來此共襟期又謝元公肅雲北雲南山萬盤仙人宫闕俯巑岏晴峯倒影半空碧雪瀑飛花六月寒鸞去徒勞尋故宅虎來還為護仙壇洞前桃樹春長在遲我歸來問大丹又起文昂吉昔人仙去大蘭山臺殿空遺石壁間崖瀑四時飛白雪溪雲長日護玄關青櫺露冷從猿采仙木風生看虎還昨夜洞前新雨過主人留客聽潺湲又韓致靜稷欲尋赤水丹山洞好是瑶簮玉筍鄉峯作翠屏分户映水為羅帶繞溪長乘雲御氣當炎漢賞月吟風羡晚唐人在石壇行禹步空歌時送佩琳琅又僧大明淨昱白水丹山何處看清暉亭上一憑闌半空積翠三台近萬丈飛流五月寒仙侣吹簫來洞口山人采藥出雲端我身亦是鄰峯鶴來往相從總不還又趙德純宜生雄峯三十六極造觀明天上有神仙窟丹霞覆其顛白鹿嚙瑶草玄猿飲靈泉山深日常靜花落春自遷髙人不羈世昕夕中盤旋石田藝嘉榖可以頥長年毛尊師石田山房張仲舉翥犖確初開百畝荒四明山麓結山房種來玉子雙雙白鑿破雲根片片方洞裏有仙惟服髓岡頭無客重尋羊知師日誦黃庭罷秪挹飛泉漱齒香又陳子山祖仁四明有神人遺世宅崇峯飛遊凌倒景餘垢亦竒蹤流風被三華有士振其宗誅茅宇峯下逈若御鴻濛琅玕四時秀靈泉左右通晨遊揖王父夕駕命青童惟兹二頃田苦辛資歲功南東不盡畝犖確溢具中由來仙聖居服食世非同白英堅過玉烹飪奉朝饔非闕耕與鋤簞瓢糜不充大盜睨而去天災無匱空虛芮昔已爭乾餱咎在躬寧知不食地東華蚤發矇東華真人有食石法超搖樂玄虛宛若咽曈曨緑髮方瞳子長身比赤松遊白水宫滑伯仁壽白水仙宮也罕逢十年兩度追陳蹤寒流光垂玉螮蝀晴巒秀削金芙蓉臨溪無魚石磊磊采藥有路雲溶溶明當挾我九節杖更來陟彼三台峯又胡士恭益鑿石種瓊田開山結丹房髙居鄰野衲塵世輕粃粳豈無胡麻飯亦有辟穀方回視衆阻飢惻愴摧中腸荷鋤出四明赤水流湯湯靈苗三聚華美玉雙成行粒粟藏大界黍珠懸昊蒼陶然熟夢境寤覺驚黃梁騰身入北斗酌彼金液漿一飲踰萬劫躡虹遊帝傍歸徠弄倒景物我俱相忘松風度虛室內白涵純陽蘿月挂峭壁瀑泉灑銀床壺中迭隱見河上參翺翔雲碓激瀨春靜休千日糧童顏駐絳霞紺髮凝玄光步虛蕊珠宫遺韻鏘琳琅咽默超象外閉兊焚清香琅玕欎森長芝草離披芳運行紫河車叱起金華羊願採長生藥持以奉明王又留如淵若沖道人住居白水洞洞口有田供鑿耕犂鉏不用辛苦少玉石自分烹鍊精拾薪澗底客共煮化羊嶺上仙俱成夜深無扄月自到坐聽九霄笙鶴聲又陳則虛斯與山根結屋便為莊不事災畬待歲欀種玉豈無和氏璞燒丹亦有禹餘糧自知雲水生涯淡誰識林泉興味長我亦欲歸尋舊業夢魂時繞錦溪傍又趙行吾思魯半壁梯雲鑿翠屏千巖鹼兩斸青冥駐鞭不假秦人力開闢元非蜀帝靈仙畹收禾勝碎榖春腴種玉可延齡歸來屐齒蒼苔滑茅屋松蘿映碧局又薛毅夫數畝依山宅一區喜存磽確勝膏腴近因辟榖懷黃石也復耕煙種白榆玉氣潤多山木秀松雲飄盡鶴巢孤會當脫屣從師去乞取青櫺顆顆珠鶴齋薛真人余之未識者而慕其可人先以詩寄之耳張憲南福别帝歸來已二秋好教安穩住丹丘編經不用青藜杖跨鶴還登白玉樓羡爾能傳唐少保愧余無復漢留侯門前白水三千丈應作黃河不盡流遊白水宫吳居正端學弱齡厭塵俗勝迹心所仰遂為物外遊獲陪林下杖魚梁依澗度鳥道緣雲上既覩仙真宅愈重煙霞想環山知幾峯飛流可千丈天神傍舞水樂臨階響皮陸迹已陳劉樊事亦往不有繼先志何能領清賞前人有遺詠磨崖看佛倣四明洞天丹山圖詠集
