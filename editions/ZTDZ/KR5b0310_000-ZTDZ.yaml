front:
  text: 四明洞天丹山圖詠集序鞠八
  hash: sha256:b5616e14fcefe040930eef0d1dcb873dbb8513ebfd56cb2f12c2968cf73f1317
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0310_SJB_000-110098c, image: sjb/11/110098c.png}
body:
  text: 滄海𨓜吏臨川曽堅撰四明山在東海上山有四穴通光晷天宇澄霽望之一如戸牗土人名之曰石䆫故山以名唐置州治今餘姚又因以明名郡宋改慶元舊治更置縣本朝陞州而山屬餘姚在州南百里圖則山麓祠宇觀所刻也其一曰元建觀之圖其二曰唐遷觀之圖㮣言之則曰四明山也木玄虚云天下洞天三十有六四明第九其號曰丹山赤水是也按山接大蘭山形勢蟠結周回三百八十里有二百八十峯髙二百一十丈常有雲氣覆冒於中几二十里不絶二十里間名曰過雲南曰雲南北曰雲北山隴行三十里有峯曰三台山曰屏風曰石屋曰雲根石屋雲根間有瀑布如懸河旁曰潺湲洞三台之側有龍湫後漢下邳劉綱爲上虞令棄官同妻樊氏雲翹居潺湲洞側從白君得仙術其上有洗藥溪學成會交友登大蘭山頂攀巨杉升其上舉手别呼夫人次之俱仙去遺履山下化爲卧虎後人名其山曰昇仙山木曰昇仙木就其近立祠宇以奉其祀有榭曰樊榭梁隠者孔祐仍居之嘗視山谷中錢數百斛樵者爭取之化爲瓦礫有鹿中矢來投祐祐爲牧豢瘉而後去故祠側建鹿𠅘陳永定中有敕建觀因其舊祠故曰祠宇云唐天寶三年遣使禱祠病其險逺勅道士崔衘處士李建移置潺湲洞外一名白水宫宋龍虎山三華院吳君真陽號混朴子從虚靜張天師學游歴至此止焉徽宗以凝神殿校籍召不起政和六年詔大其觀建玉皇殿書其榜而門曰丹山赤水洞天封劉綱昇玄明義真君樊氏昇真妙化元君而混朴子授丹林郎禁樵採蠲租賦髙宗丞相張魏公知其徒孔容因表混朴子爲真人許歳度道士一人以甲乙傳次嘉熈初元理宗禱嗣於㑹稽之龍瑞宫竣事分金龍玉簡藏焉今毛尊師永貞由三華嗣主之山之木曰青櫺樹其實味甘而不可倅破山之獸曰鞠猴唐咸通中謝遺塵隱此陸龜䝉皮日休時時徃還各賦詩九首取以爲題宋陸游記之余再以使事航海岀慶元洋掠餘姚竟上者四西望縹渺如輕雲挿入天末舟師指以相告曰大蘭山也至京師適薛君毅夫由毛尊師所來示予二圖想見其山川竒秀思欲得相羊上下從一二瀟灑士坐鹿𠅘酌潺湲呼鞠猴一洗其塵土之累而吏役驅迫昔者舟行徒悵望咨嗟而已近世士大夫汨於利逹上之不能效劉綱脫屣簮𥿈次之不能如皮陸忘形賦詠宜乎髙世之士揶揄哂唾而目其地曰洞天也余故詳述其本末使有志物外者得以覽觀焉四明洞天丹山圖詠集唐木玄虛僎唐賀知章注四明山名赤水天靈蹤聖跡自天然二百八十峯相接其間窟宅多神仙按記云此山四面各有七十峯計二百八十峯相連如屏也其山東面如驚浪七十髙峯列烟嶂一條流水入勾章二仙聖德彰兹飬二仙者是董黯鮑全全有聖徳之行黯有孝道之功記云此乃四明山地仙俱岀後漢時秦皇神將有王鄞驅山塞海溺其身葬於水底不填築號作鄞江今見存四明山名勾章其江因鄞江此通大洋也大雷山前靜水洞謝眺曾居兹讀誦因名大慈屬慈溪泉源水脉皆相統大雷山昔多禽獸每有獵人常汚觸其洞間後有神仙偶爲大雷雨阻之因而爲名晉漢時多有賢人得道之士皆隠此山中内亦有金雞洞數峯狀似蓮花葉葉勢與梨洲洞接一泒清泉下小溪數百餘家安活業内有芙蓉峯與梨洲洞相近晉時有興子孫公戊遊此山見道邊梨熟因喫三兩顆便覺飽再來尋已失其所後因名之傍聳髙峯形突兀頂頭石匣盛仙蜜下有龍潭湛百尋藏書石室深牢宻名蜜岩峯上有石匣盛仙蜜曽動星象下有龍潭公私禱祀向下更有一潭名石質潭内有石室貯藏神仙秘典禹時有𨓜士王真親曽開看甚竒異也其山西南如奔牛岧嶤次第相連鈎大峯小峯計七十山足兩岐通越洲山脚下便是餘姚上虞兩縣屬越洲水陸皆通伏龜山如雞子狀隠岫嵯峨百般様山中三朶五朶峯仙人日日遊其上西南山多異狀兼有三五朶竒峯出没山嵐中漢時曽有張平子駐前割木呈其𠆸板木餘殘三五堆紫金聲色真神異四角仭雕獅子守塵刼雖移終不朽毛竹千叢生澗邊藥苗仙果般般有漢時張子平曾割木於此山有板木三五堆作紫金色常有雲霞覆之昔時張充曽見此板得五寸徃見㑹稽太守令割作蝴蝶其木充天去也翠岩中間有石壁礙石遮雲數千尺内生異果能飽人兼有澗泉通海脉晉時葛仙翁到此山澗中有魚長六七尺仙翁以杖撃之勿見山神曰勿恠縁澗水通大洋此魚常從海而來也魏時有人楊德祖路傍曽與山仙語二仙把火覓金刀像形剡字因兹起楊徳祖遊此山忽見一老人云前行見二仙把火覓刀可詳之德祖果見之乃言兩火是炎字更覓金刀是剡字因名剡溪也其山南面如驅羊七十峯巒形列張漢時劉阮迷七日人間六代子孫亡有劉阮二人同行採藥到仙家七日却回人間已過三百年矣歸家猶見第七代子孫也中有大池數畝地穴内仙蛇常吐氣化爲雲雨作樓臺水應簟溪入數處因水流岀仙簟故老人相傳名簟溪是也白巖瀑布如飛練俱入紫溪流汗漫中有一山如履盆林木交加華卉亂兩峯各名大小晦蔽日隂沈輕霧翳樵夫應則昔時遊石床數丈祥雲盖宋時有應則入山忽逡廵境色秀麗即復來已不見但㝠晦不敢久住因名大小晦紫溪即白水近觀其間仙獸有犀牛范顔捕得皮爲裘服之對面人不見隱藏形質無蹤由梁時有范顏到此山見犀牛數頭捕得一頭裂其皮作裘服之便失其形人覩不見因號隱形裘山在曰西山南是也其山北面如走蛇危巒疊嶂無津涯七十之峯數亦足八囊罾網相交加北而有入靈山其状如罾綱加有走蛇之勢是也又湧二山爲兩陣引開長澗分墻仭抱子山頭石室平泉如甘露靈仙隱鄭宏曾竟山海經經中具列此泉名名爲聖水味甘滑得而服之當長生有山兩陣相向中央澗水流分四面今俗呼爲大小皎是也宋時鄭宏曾尋得此泉水道服之其石室中見有聖像在焉近代不聞神仙異迹四明山中如伏虎遍生青石爲其祖鑿開七竅出祥雲竅中各可興風雨四明山中心名伏虎山有赤石栢梓之木皆有七竅皆泊龍神按山海經云山嵩無竅不爲名山也石庫藏書倉貯塩食之其味多甘甜一條搓木二百尺光明夜照羣山尖梅福曽宿此庫見書莫知其數云齊時樵人何昕者遇一倉塩以少許歸與母食其味甘不数日白髮再黑韶顏如童再徃取之已失其所也又見一槎木長二十餘丈横在山腹中常吐光明人皆見也東連勾章西舜窟南嗣天台通地骨北包翠竭愛其源地聖天仙時現没此是四明山之四至也周廼盤廣八百里古來靈瑞難遍紀梅福爲仙居此山劉綱作宰妻樊氏周景時義士益昌遊此山先得昇仙後有梅福又遊此山一宿室内夣見一人謂福曰周時益昌化於此山室其骨秘天井及明早景於天井中獲得其骨未朽遂與埋之後漢劉綱字伯經任上虞令與夫人樊氏雲翹居四明山皆得仙道一日至大蘭𢍂丘山上登巨木飛昇吳上虞令劉公傳讃令君字伯經諱綱下邳人也初居四明山後爲上虞令師事白君受道歴年道成邀親故㑹別飮食畢登大杉木上去地十餘丈舉手而别忽然飛入雲中而去妻樊夫人亦有道術俱昇天今白水觀乃其遺迹云事載葛稚川神仙傳及白水觀碑讃曰天人幾何同寄一塵士局耳日分妄與真劉公登天如適其鄰以水投水同則相親宋孔先生傳讃先生史佚其字諱祐敬康曽孫也至行通神隱於㑹稽四明山嘗見山谷中有數百斛錢視之如瓦石不異采樵者競取入手即成沙礫曽有鹿中箭來投先生爲之飬創愈然後去太守王僧䖍欲引爲主簿不可屈先生子道徽與杜景齊友善少厲髙行能世其家風隠居南山終身不窺都邑齊豫章王嶷爲楊州辟西曹書佐不至郷里宗慕之道徽兄子緫有操行遇寒饑不可得衣食縣令丘仲孚薦之除竟陵王侍郎竟不至事載南史隱逸傳讃曰貪夫徇利或死懷璧公不動心視同瓦礫素風薰陶猶子絶識一門清節廼祖遺徳四明山銘應奉翰林文字文林郎同知制誥兼國史院編脩官臨川危素撰餘姚南去七十里有山二百八十峯東連句章南接天台北包翠竭中峯最髙上有四穴若開戸牖以通日月之光故號四明洞天恒有雲氣覆其上秦皇命臣王鄞驅山塞海百靈勞役奔入此地因名鬼藏山云漢上虞縣令劉綱字伯經下邳人後居山中從白君得仙術他日㑹别親友登大蘭丘援巨木飛昇其妻樊氏從之遺履木下化爲虎事聞于朝即其地立祠宇春秋祀焉宋隠者孔祐視山谷中錢數百斛與瓦石無異樵者爭取之即成沙礫有鹿中矢來投祐祐爲豢之創愈而後去唐天寳三年玄宗以劉君祠宇險逺命道士崔衘處士李建改築于山麓二十里劉君修煉處宋末髙士謝遺塵隠於是陸龜䝉皮日休皆至爲詩各九章以相倡和宋政和間徽宗書其榜曰丹山赤水洞天命建玉皇殿用方士法所寘金龍玉簡至今存焉主領焚修以甲乙相傳國朝秩祀名山頒賜香幣閽亦及然楝宇傾撓莫有留意其先出於龍虎山三華道院故廣信毛永貞嗣居之乃斥大其屋廬足稱夫仙靈之宅毛君之門人臨川呉國珙來請篆銘將勒山石銘曰越山之峯石穴玲瓏天欲雨浮雲䝉真人上昇遺木履潺湲古洞聞流水白鶴裵回拎盖戾止玉童採得青櫺子子能食之可不死史素作銘式告千禩白水觀記至治間余讀書信之龍虎山適里中朱貞一先生同館舍其人毛君永貞執侍左右簡黙粹門退則過余從容欵治既去隠餘姚山中聲迹邈不相聞後二十有八年其徒呉國珙來京師請銘其所居四明山始詢君無恙既叙而銘之又後一紀先生門人薛毅夫携所刻山圖復請書其所未備於是與君不相見者四十年矣顧余竊禄班行汨没塵壒聞君飄然髙舉於海岸孤絶之地志慮凝重無亳髮外求於世恒慕羡之所謂上虞令劉綱夫婦登真隱者孔祐化錢療鹿唐玄宗遷祠宇陸魯望皮襲美倡和宋徽宗書洞天之榜建玉皇殿投金龍玉簡事此叙之所及者若乃舊祠宇之所見者有昇仙山昇仙木雲南雲北過雲㑹稽志謂謝遺塵隱於南雷今有大雷峯圖之所未者觀圖有三台峯雲根石屋龍湫洗藥溪潺湲洞四明郡志則云東北百三十里湧爲二百八十峯中有三十六峯東西南北各有門由餘姚言之爲西四明則叙所未書者宋虚靜天師張公之門人呉真陽學于龍虎之三華道院號曰混檏子來遊是山徽宗以丹林郞凝神殿校籍召之不起封劉綱昇玄明義真君其配樊夫人封昪真妙化元君丞相張魏公與呉君門人朱孔容交表爲真人孔容之後世以甲乙傅次此亦叙所未書者也君構清暉亭於瀑布之下營石田山房以自休息在余作銘之後其賦詠留山中唐自陸皮之前有孟東野劉文房宋有謝師厚而下若干人迨國朝黄文獻公而下若干人君又將刻而傳之按㑹稽志云俗謂之白水宫又云有白水觀碑盖祠宇觀宇義重複故今當稱爲白觀余得郷貢進士番昜徐勉之保越録越之禍亂極矣四明之山風塵不驚君優游其間甘食而安𥨊古所謂武陵桃源者信有之矣故爲之記使與銘并刻之君字善𡖖薛君字茂弘相其後者潘文信盛元朴許用和至正二十二年三月丁未朔通奉大夫中書叅知政事同知經筵事提調四方獻言詳定使司事臨川危素記石田山房詩序餘姚州南百里曰四明山神仙家丹山赤水洞天在焉漢上虞令劉綱嘗修煉飛昇于是有觀曰祠宇觀傍屋曰石田山房則毛尊師永貞之所築也初三十代虚靜張天師以道術授上清宫三華院混檏呉真人阮得其傳居是山宋徽宗聞賢召之不起即所居斥而廣之大故祠宇之系出於三華而三華世視祠宇則其所䖏之舘也我仁皇時天下無事玄教張吳二大宗師相繼在朝三華院有貞一先生朱本初亦以博洽文雅見稱于卿相間毛君寔從之游先生固愛之二宗師尤器重焉以教檄歸領祠宇觀事祠宇時頗廢自毛君主之圯無不興敝無不葺今垂四十年矣勒厲如一日飭理之暇則退處于山房焚香燕坐外物一不以累其心盖其左右有穹崖峭壁流泉瀑布噴灑交射勢若縣河其下則磊磈犖硧𢖍亘從合畦町萬狀無非石也菖蒲河車芝草蒼耳隨采而足稻梁縻芑之植十不收一二焉故曰石田名之薛君毅夫亦學貞一之學隱居白屋山山在上清之近繼至石田樂其幽勝首爲賦詩至京師吿于文士大夫曰石田其地勝毛君其人賢吾亦將從而老矣則各爲賦詩得若干首來屬余叙觀老子倡知雄守雌之說以爲道惟得其傳則能致虚守薄捨繁華盛麗之美而安於寂寞荒僻之陋以息其神以怡其真以全其身盖其道然也若毛君者幾其人矣世當承平時夫人疲精竭智以爭夫膏腴衍沃之區而肆其髙廣壯麗之構者天下皆是也視夫石田奚啻霄壤之間哉兵興十年自夫維揚河南蕃富甲天下者剗削蹂踐無餘昔之東阡西陌者荒烟野草矣凉臺燠室者頽垣敗礎矣欲求彷彿於石田山房也可得乎吾是知毛君之智也以是知夫能得其師之傳者也謹序之而因夫薛君以詒焉至正二十一年冬十月朔臨川曽堅序唐賢詩送蕭鍊師歸四明山孟東野郊閑於獨鶴心大於髙松年廻出萬物表髙栖四明巔千尋直列峯百尺倒㵼泉絳雪爲我飯白雲爲我田靜言不話俗靈跡時歩天遊四䆫劉文房長𡖖四明山絶竒自古說登陸蒼崖𠋣天立覆石如覆屋玲瓏開戸牖落落明四目箕星分南野有斗掛簷北日月居東西朝昏互出没我來遊其間寄傲巾半幅白雲無本心悠然伴幽獨對此脱塵鞅頓忘榮與辱長笑天地𡩖仙風吹佩玉九詠石䆫陸魯望龜䝉石䆫何處見萬仭𠋣晴虚積靄迷青瑣殘霞動綺䟽山應列圓嶠宫便接方諸只有三峯客時來校隱書過雲相訪一程雲雲深路僅分嘯臺隨日辯樵斧帶風聞暁看衣全濕寒衝酒不醺幾囬歸思靜髣髴見蘇君雲南雲南更有溪丹礫盡無泥藥有巴賔賣枝多越鳥啼夜清先月午秋近問嵐迷若得山顔住芝菌手自携雲北雲北近陽川人家洞壑連壇當星斗下樓拶翠微邊一半遥峯雨三條古井烟金庭如有路應到左神天鹿亭鹿亭岩下置時引白塵過草細眠應久泉香飮自多認聲來月塢尋路到烟羅早晚吞金液騎將上絳河樊榭古榭何時築人應白日飛至今山客說時駕玉麟歸乳帶懸松嫰芝臺出石微慿䦨虚目斷不見羽華衣潺湲洞飛瀑瀉雲根潺潺萬古音似吹雙羽管如奏落霞琴倒穴漂龍沫穿松濺鶴襟何人乗月弄應作上清吟青櫺子山實號青櫺環岡次第生外形堅緑穀中味敵瓊英墮石樵兒拾敲林宿鳥驚亦應仙吏守時取薦層城鞠猴何事鞠猴名先封在四明但爲連臂飲不作斷腸聲野蔓垂纓細寒泉碾玉清滿林遊宦子誰與作公𡖖石䆫皮襲美日休䆫開自真宰四遶見蒼崖苔染渾成綺雲漫便當紗櫺中空吐月扉際不扄霞未㑹通何處應連玉女家過雲粉洞二十里當中幽客行片時迷鹿跡寸歩隔人聲以杖探虚翠將襟惹薄明經時未遇得恐是入層城雲南雲南背一川無鴈到峯前墟里生紅藥人家發白泉兒童皆自古婚嫁盡如仙共作真官户無由稅石田雲北雲北晝㝠㝠空疑背夀星犬能諳藥氣人解寫芝形野歇遇松盖醉書逢石屏焚香住此地應得入金庭鹿亭鹿羣多此住因過白雲楣待侣傍花久引麈穿竹遲經時飲玉澗盡日嗅金芝爲在石䆫下成仙自不知樊榭主人成列仙故榭獨依然石洞聞人咲松聲驚鹿眠井香爲大藥鶴語是虚篇欲買重栖隠雲峯不售錢潺湲洞水流萬丈源盡日㵼潺湲敲碎一輪月鎔消半叚天響髙吹谷動勢急歕雲旋料得深秋夜臨流盡古仙青櫺子山風熟異果夜是供真仙味似雲腴美形如玉腦圓御來多野鶴落處半靈泉必共桃源種花開不記年鞠候堪羡鞠猴國碧巖千萬重烟蘿爲印綬雲壑是提封衆遣狚公渡果教𤟤子供爾徒如不死應得躡玄宗宋賢詩瀑布謝師厚景初飛泉縁峭壁斗絶千萬丈奔流天上來望若匹練廣曲嶺隔青林永挹先聞響其傍有巨石平潤可俯仰俗士所不到我輩固來賞須期秋色清攀蘿遡其上遊四明孫季和應時平生抱遐尚撫劔逺行遊迹謝聲利牽心與巖壑謀東征泛蒼海南鶩踰丹丘西登岷峨嘯北望關隴愁康廬挽歸轡巫峽紆行舟劔閣最險壯龍門更竒幽歴覽雖未飽勝㮣略已收爾來卧竹湖清夣長夷猶家山維四明名字横九州出門宛在眼欲徃輙不酬人事真好乖山靈豈吾仇忽近益可咲投老空自尤玆辰正芳春㑹心得良儔贏粮幸易足快䇿遂所求中宵雨聲斷逗晚霽色浮天容極瑩淨風氣亦和柔瘦笻挾籃輿野服兼輕裘遥遥指林麓欣欣聽泉流試屐青烟嶺弭盖白水湫飛湍響淙潺恠松韵颼恨哉上羊額喘若料虎頭甓石昉歳基負樵歌道周百折快一眺千里森雙眸峯巒何綿聮脉絡相纒繆化鈞妙融結神功巧雕搜長風動溟渤洪濤簸瀛洲巨鰲岀屭屓游龍繞蚴蟉鯨鵬恣摩盪蟲魚紛疊稠萬怪各起伏千㠶逓行留或坦若几席或峩若冠旒或排若劔㦸或剡若戈矛或舞若鸞鳳或驟若驊騮或戯若狻猊或摶若貅貔儼然開明堂玉帛朝諸侯赫然㑹岐陽長圍方大蒐鏖戰臨長平堅壁持鴻溝廣野列車騎中軍嚴斾斿開闢浩茫茫變化久悠悠愕眙不得語形容那可侔仙樹四十圍蟠根幾千秋老𠏉枯不死新榮翠相樛颷馭定來止桑田行驗不遺跡信所聞輕舉當何由東南徑崇岡左右羅平疇人家散雞犬村塢來羊牛官征畢薪炭春事勤鋤耰土膩少沙石氣寒無麥麰荒蹊夾桃李宻䕃開松楸是中可避世何勞更乘桴駢巖下峭壁别岫爭崒崷孰云二刹勝逝肯中道休仗錫既巉絶雪竇仍阻脩停雲朝漠漠剛風